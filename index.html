<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloKG</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMDAwMDAwIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+CiAgPHBhdGggZD0iTTEwIDRWMjAiLz4KICA8cGF0aCBkPSJNMjAgNEwxMCAxMiIvPgogIDxwYXRoIGQ9Ik0yMCAyMEwxMCAxMiIvPgo8L3N2Zz4K">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f0f0;
            min-height: 100vh;
            width: 100%;
            border: none;
            border-radius: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 20px;
            flex-direction: column;
        }

        @keyframes emojiPopup {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        .search-container {
            display: flex;
            gap: 0;
            padding: 0;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
        }

        .search-box {
            padding: 12px 95px 12px 55px;
            font-size: 14px;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            border: 2px solid #000000;
            border-radius: 10px;
            outline: none;
            width: 500px;
            max-width: 100%;
        }

        /* Input fade-in animation */
        input[type="text"],
        input[type="password"],
        input[type="search"],
        input[type="email"],
        input[type="url"],
        textarea {
            transition: color 0.2s ease;
        }

        input.typing {
            color: #000000 !important;
        }

        .search-button {
            width: 44px;
            height: 44px;
            background-color: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            padding: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 1;
        }

        .search-button:hover {
            transform: translateY(-50%) scale(1.1);
        }

        .search-button svg {
            width: 24px;
            height: 24px;
        }

        /* Bottom buttons (KG and Favorites) */
        .bottom-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: normal;
            color: #000000;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        .bottom-btn:hover {
            opacity: 0.7;
        }

        .bottom-btn svg {
            stroke-width: 2;
        }

        /* Scanner Modal Styles */
        #scannerModal .scan-frame {
            width: 400px;
            height: 400px;
        }

        /* Mobile responsive styles */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                border-width: 2px;
            }

            .search-container {
                padding: 10px;
                width: 100%;
            }

            .search-box {
                flex: 1;
                min-width: 0;
                font-size: 16px;
                padding: 14px 73px 14px 43px;
            }

            .search-button {
                width: 50px;
                height: 50px;
                flex-shrink: 0;
            }

            .suggestions {
                position: absolute;
            }

            .search-engine-selector {
                position: relative;
            }

            /* Scanner modal mobile responsive */
            #scannerModal .scan-frame {
                width: 300px !important;
                height: 300px !important;
            }
            
            #scannerModal .scan-text {
                font-size: 14px !important;
            }
        }

        .search-hint {
            margin-top: 15px;
            padding: 10px 15px;
            border: 2px solid #000000;
            border-radius: 8px;
            background-color: #f0f0f0;
            font-size: 13px;
            line-height: 1.6;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        .search-hint-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .search-hint-item {
            color: #333;
        }

        /* Search suggestion styles */
        .suggestions {
            position: absolute;
            top: 100%;
            margin-top: 5px;
            background: #f0f0f0;
            border: 2px solid #000000;
            border-radius: 10px;
            list-style: none;
            max-height: 160px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-sizing: border-box;
        }

        .suggestions.visible {
            display: block;
        }

        .suggestions li {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            transition: background-color 0.2s;
        }

        .suggestions li:hover {
            background-color: #f0f0f0;
        }

        /* Search history styles */
        .search-history {
            position: absolute;
            top: 100%;
            margin-top: 5px;
            background: #f0f0f0;
            border: 2px solid #000000;
            border-radius: 10px;
            list-style: none;
            max-height: 160px;
            overflow-y: auto;
            z-index: 999;
            display: none;
            box-sizing: border-box;
        }

        .search-history.visible {
            display: block;
        }

        .search-history li {
            padding: 10px 35px 10px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
            position: relative;
        }

        .search-history li:hover {
            background-color: #f0f0f0;
        }

        .search-history li .delete-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .search-history li:hover .delete-btn {
            opacity: 1;
        }

        .search-history li .delete-btn:hover {
            color: #ff4444;
        }

        .search-history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }

        .search-history-header .clear-all {
            cursor: pointer;
            color: #666;
        }

        .search-history-header .clear-all:hover {
            color: #ff4444;
        }

        /* Search engine selector styles */
        .search-engine-selector {
            margin-top: 10px;
            padding: 10px 15px;
            border: 2px solid #000000;
            border-radius: 10px;
            background-color: #f0f0f0;
            max-width: 100%;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-engine-selector[style*="display: block"] {
            opacity: 1;
            transform: translateY(0);
        }

        .engine-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .engine-item {
            padding: 6px 12px;
            border: 2px solid #000000;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #f0f0f0;
            font-size: 13px;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        .engine-item:hover {
            background-color: #e0e0e0;
        }

        .engine-item.active {
        }

        /* Poem styles */
        .poem-container {
            margin-top: 30px;
            padding: 0;
            border: none;
            background-color: transparent;
            max-width: none;
            text-align: center;
            position: absolute;
            bottom: 20px;
        }

        .poem-content {
            font-size: 12px;
            line-height: 1.6;
            color: #000000;
            font-weight: normal;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }

        .poem-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #000000;
        }

        .poem-author {
            font-size: 13px;
            color: #333;
            margin-bottom: 10px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="search-container" style="position: relative; background: #f0f0f0;">
        <!-- Scan QR code button (left side) -->
        <button class="search-button" id="scanBtn" style="left: 7px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                <rect x="7" y="7" width="10" height="10" rx="1"></rect>

        <input type="text" class="search-box" id="searchInput" placeholder=" " autocomplete="off" style="background: #f0f0f0;" />
        <!-- Engine toggle button (left of search button) -->
        <button class="search-button" id="engineToggleBtn" style="right: 42px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>

        <!-- Search history container -->
        <ul id="searchHistory" class="search-history" style="display: none;"></ul>
        <ul id="suggestions" class="suggestions"></ul>
    </div>
    
    <!-- KG and Favorites buttons below search box -->
    <div class="bottom-buttons-container" style="display: flex; justify-content: center; gap: 15px; margin-top: 12px;">
        <button class="bottom-btn" id="kgBtn" style="padding: 8px 16px; border: 2px solid #000000; border-radius: 6px; background: #f0f0f0; cursor: pointer; font-size: 14px; font-weight: normal; color: #000000;">

        <button class="bottom-btn" id="favBtn" style="padding: 8px 16px; border: 2px solid #000000; border-radius: 6px; background: #f0f0f0; cursor: pointer; font-size: 14px; font-weight: normal; color: #000000;">

    <!-- QR Scanner Modal -->
    <div id="scannerModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #f0f0f0; z-index: 10000;">

        <!-- Close button (top right) -->

        <!-- Header with search and add new -->
        <div style="padding: 60px 20px 20px 20px; display: flex; gap: 10px; align-items: center;">
            <input type="text" id="favSearchInput" placeholder="搜索收藏网页..." style="flex: 1; padding: 10px 15px; border: 2px solid #000000; border-radius: 6px; font-size: 14px; outline: none; background: #f0f0f0;">

        <!-- Favorites list -->

    <!-- KG Modal -->
    <div id="kgModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #f0f0f0; z-index: 10000; overflow-y: auto; user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;">
        <!-- Close button (top right) -->
        <div style="position: absolute; top: 20px; right: 20px; color: #000000; font-size: 30px; cursor: pointer; z-index: 10001;" onclick="closeKG()">×</div>
        
        <!-- Header with search only -->
        <div style="padding: 60px 20px 20px 20px;">
            <input type="text" id="kgSearchInput" placeholder="搜索 KG 网页..." style="width: 100%; padding: 10px 15px; border: 2px solid #000000; border-radius: 6px; font-size: 14px; outline: none; background: #f0f0f0;">
        </div>
        
        <!-- KG list -->
        <div id="kgList" style="padding: 0 20px 40px 20px;"></div>

    <!-- Custom Confirm Dialog -->
    <div id="customConfirm" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); z-index: 20000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f0f0f0; border: 2px solid #000000; border-radius: 10px; padding: 30px; min-width: 300px; max-width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <div id="customConfirmMessage" style="font-size: 16px; margin-bottom: 25px; text-align: center; line-height: 1.5;"></div>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="customConfirmCancel" style="flex: 1; padding: 10px 20px; border: 2px solid #000000; border-radius: 6px; background: #f0f0f0; cursor: pointer; font-size: 14px; transition: all 0.2s;">取消</button>
                <button id="customConfirmOk" style="flex: 1; padding: 10px 20px; border: 2px solid #000000; border-radius: 6px; background: #000000; color: white; cursor: pointer; font-size: 14px; transition: all 0.2s;">确定</button>
            </div>
        </div>
    </div>

    <!-- Custom Prompt Dialog -->
    <div id="customPrompt" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); z-index: 20000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f0f0f0; border: 2px solid #000000; border-radius: 10px; padding: 30px; min-width: 350px; max-width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <div id="customPromptMessage" style="font-size: 16px; margin-bottom: 15px; text-align: center; line-height: 1.5;"></div>
            <input type="text" id="customPromptInput" style="width: 100%; padding: 10px; border: 2px solid #000000; border-radius: 6px; font-size: 14px; outline: none; margin-bottom: 20px; box-sizing: border-box;">
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="customPromptCancel" style="flex: 1; padding: 10px 20px; border: 2px solid #000000; border-radius: 6px; background: #f0f0f0; cursor: pointer; font-size: 14px; transition: all 0.2s;">取消</button>
                <button id="customPromptOk" style="flex: 1; padding: 10px 20px; border: 2px solid #000000; border-radius: 6px; background: #000000; color: white; cursor: pointer; font-size: 14px; transition: all 0.2s;">确定</button>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('searchInput');
        const suggestionsList = document.getElementById('suggestions');
        const searchHistoryList = document.getElementById('searchHistory');
        
        // Search history management
        const MAX_HISTORY = 50;
        
        function getSearchHistory() {
            const history = localStorage.getItem('searchHistory');
            return history ? JSON.parse(history) : [];
        }
        
        function saveSearchHistory(history) {
            localStorage.setItem('searchHistory', JSON.stringify(history));
        }
        
        function addToHistory(query) {
            if (!query.trim()) return;
            
            let history = getSearchHistory();
            
            // Remove if already exists
            history = history.filter(item => item !== query);
            
            // Add to beginning
            history.unshift(query);
            
            // Keep only MAX_HISTORY items
            if (history.length > MAX_HISTORY) {
                history = history.slice(0, MAX_HISTORY);
            }
            
            saveSearchHistory(history);
        }
        
        function deleteHistoryItem(index) {
            let history = getSearchHistory();
            history.splice(index, 1);
            saveSearchHistory(history);
            showSearchHistory();
        }
        
        function clearSearchHistory() {
            localStorage.removeItem('searchHistory');
            searchHistoryList.style.display = 'none';
            searchHistoryList.innerHTML = '';
        }
        
        function showSearchHistory() {
            const history = getSearchHistory();
            
            if (history.length === 0) {
                searchHistoryList.style.display = 'none';
                return;
            }
            
            // Update width and position to match search box
            const searchBox = document.getElementById('searchInput');
            const rect = searchBox.getBoundingClientRect();
            const container = document.querySelector('.search-container');
            const containerRect = container.getBoundingClientRect();
            
            const leftPos = rect.left - containerRect.left;
            
            searchHistoryList.style.width = rect.width + 'px';
            searchHistoryList.style.left = leftPos + 'px';
            searchHistoryList.style.right = 'auto';
            
            // Build HTML
            let html = `<li class="search-history-header">
                            <span>搜索历史</span>
                            <span class="clear-all" onclick="clearSearchHistory()">清空</span>
                        </li>`;
            
            history.forEach((item, index) => {
                html += `<li onclick="selectHistory('${item.replace(/'/g, "\\'")}')">
                            ${item}
                            <span class="delete-btn" onclick="event.stopPropagation(); deleteHistoryItem(${index})">✕</span>
                        </li>`;
            });
            
            searchHistoryList.innerHTML = html;
            searchHistoryList.style.display = 'block';
            console.log('Showing search history:', history.length, 'items');
        }
        
        function selectHistory(query) {
            input.value = query;
            performSearch();
        }
        
        // Cookie utility functions
        function setCookie(name, value, days) {
            const expires = new Date();
            expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = `${name}=${encodeURIComponent(value)};expires=${expires.toUTCString()};path=/`;
        }
        
        function getCookie(name) {
            const nameEQ = name + '=';
            const ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(nameEQ) === 0) {
                    return decodeURIComponent(c.substring(nameEQ.length));
                }
            }
            return null;
        }
        
        // Load saved engine from cookie or use default
        let currentEngineUrl = getCookie('searchEngine') || 'https://cn.bing.com/search?q='; // Default: Bing China

        // Search functionality using current engine
        function performSearch() {
            let query = input.value.trim();
            
            if (!query) return;
            
            // Add to search history
            addToHistory(query);
            
            // Hide suggestions and search history
            hideSuggestions();
            searchHistoryList.style.display = 'none';
            
            // Clear search box
            input.value = '';
            
            // Handle .xxx format -> www.xxx.com
            if (query.startsWith('.') && !query.includes(' ')) {
                const domain = query.substring(1);
                query = `www.${domain}.com`;
            }
            
            // Handle @xxx format -> xxx (remove @)
            if (query.startsWith('@') && !query.includes(' ')) {
                query = query.substring(1);
            }
            
            // Check if it's a URL (contains www. or starts with http)
            if (query.includes('www.') || query.startsWith('http://') || query.startsWith('https://')) {
                // Ensure https protocol
                if (!query.startsWith('http://') && !query.startsWith('https://')) {
                    query = 'https://' + query;
                }
                window.open(query, '_blank');
            } else {
                // Use current search engine for normal queries
                window.open(`${currentEngineUrl}${encodeURIComponent(query)}`, '_blank');
            }
        }

        // Fetch search suggestions from Baidu
        function fetchSuggestions(keyword) {
            if (!keyword) {
                hideSuggestions();
                return;
            }

            const script = document.createElement('script');
            script.src = `https://suggestion.baidu.com/su?wd=${encodeURIComponent(keyword)}&cb=renderSuggestions`;
            document.body.appendChild(script);
            
            // Clean up after loading
            setTimeout(() => {
                if (script.parentNode) {
                    script.parentNode.removeChild(script);
                }
            }, 5000);
        }

        // Render suggestions callback
        window.renderSuggestions = function(data) {
            if (!data.s || data.s.length === 0) {
                hideSuggestions();
                return;
            }

            suggestionsList.innerHTML = data.s.map(item => `<li>${item}</li>`).join('');
            suggestionsList.classList.add('visible');
            
            // Match search box width and position exactly
            const searchBox = document.getElementById('searchInput');
            const rect = searchBox.getBoundingClientRect();
            const container = document.querySelector('.search-container');
            const containerRect = container.getBoundingClientRect();
            
            // Calculate position relative to container
            const leftPos = rect.left - containerRect.left;
            const rightPos = containerRect.right - rect.right;
            
            suggestionsList.style.width = rect.width + 'px';
            suggestionsList.style.left = leftPos + 'px';
            suggestionsList.style.right = 'auto';
        };

            const modal = document.getElementById('scannerModal');
            const video = document.getElementById('video');

            modal.style.display = 'block';
            
            // Start camera
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(function(stream) {
                        scannerStream = stream;
                        video.srcObject = stream;
                        video.play();
                        
                        // Start scanning

                    })
                    .catch(function(err) {
                        console.error('Camera error:', err);
                        alert('无法访问摄像头，请确保已授予相机权限');
                        closeScanner();

            } else {
                alert('您的浏览器不支持摄像头访问');
                closeScanner();
            }

        function startScanning(video, canvas) {
            // Use jsqr library for QR code detection
            const canvas2d = canvas.getContext('2d');
            
            function detectQRCode() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas2d.height = video.videoHeight;
                    canvas2d.width = video.videoWidth;
                    canvas2d.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
                    
                    const imageData = canvas2d.getImageData(0, 0, video.videoWidth, video.videoHeight);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    
                    if (code) {
                        console.log('QR Code detected:', code.data);
                        closeScanner();
                        
                        // Open result in new tab after 500ms
                        setTimeout(() => {
                            window.open(code.data, '_blank');
                        }, 500);
                        return;
                    }
                }
                
                // Continue scanning
                requestAnimationFrame(detectQRCode);
            }
            
            detectQRCode();
        }

        // Input fade-in animation for all input fields
        function setupInputFadeIn() {
            const inputs = document.querySelectorAll('input[type="text"], input[type="password"], input[type="search"], input[type="email"], input[type="url"], textarea');
            
            inputs.forEach(input => {
                let timeoutId = null;
                
                input.addEventListener('input', function(e) {
                    // Clear previous timeout
                    if (timeoutId) {
                        clearTimeout(timeoutId);
                    }
                    
                    // Remove and re-add typing class to trigger animation
                    this.classList.remove('typing');
                    
                    // Force reflow
                    void this.offsetWidth;
                    
                    // Add typing class after a tiny delay to trigger the transition
                    timeoutId = setTimeout(() => {
                        if (this.value) {
                            this.classList.add('typing');
                        }
                    }, 10);
                });
                
                input.addEventListener('blur', function() {
                    // Keep the text visible when blurred
                    if (this.value) {
                        this.classList.add('typing');
                    } else {
                        this.classList.remove('typing');
                    }
                });
            });
        }
        
        // Initialize input fade-in animation
        setupInputFadeIn();
    </script>
</body>
</html>
