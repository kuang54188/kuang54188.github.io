<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloKgSearch</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23FF6B8A'/%3E%3Ctext x='50' y='70' font-family='Arial, sans-serif' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .wallpaper-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 顶部 GitHub 链接 */
        .github-link {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-family: 'Microsoft YaHei', sans-serif;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .link-default {
            font-weight: bold;
            transition: opacity 0.3s ease;
        }

        .link-url {
            opacity: 0;
            max-width: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            font-weight: normal;
        }

        .github-link:hover {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            transform: translateX(-50%) scale(1.05);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .github-link:hover .link-url {
            opacity: 1;
            max-width: 300px;
        }

        .wallpaper-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: all 0.5s ease-in-out;
        }

        .wallpaper-container img.loaded {
            opacity: 1;
        }

        .wallpaper-container.searching img {
            filter: blur(10px) brightness(0.3);
            transform: scale(1.05);
        }

        .wallpaper-container.searching .time-container,
        .wallpaper-container.searching .poetry-container {
            opacity: 0;
            margin-top: -50px;
            transition: opacity 0.3s ease, margin-top 0.3s ease;
            pointer-events: none;
        }
        
        /* Hide all UI elements when searching */
        body.searching .time-container,
        body.searching .poetry-container,
        body.searching .settings-btn {
            opacity: 0;
            margin-top: -50px;
            transition: opacity 0.3s ease, margin-top 0.3s ease;
            pointer-events: none;
        }
        
        /* Background turns black when searching - 黑色透明模糊效果 */
        body.searching .wallpaper-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .wallpaper-container.searching .settings-btn {
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        .wallpaper-container.searching .search-btn {
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: auto;
        }

        .coming-soon-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transform: translateY(100%);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .coming-soon-overlay.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
                
        /* Favorites container */
        .favorites-container {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: transparent !important;
        }
                
        /* Top search bar */
        .favorites-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }
                
        .favorites-search-box {
            flex: 1;
            max-width: 600px;
            padding: 12px 20px;
            font-size: 16px;
            font-family: 'Microsoft YaHei', sans-serif;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
                
        .favorites-search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
                
        .favorites-search-box:focus {
            background: rgba(255, 255, 255, 0.25);
        }
                
        .add-site-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
                
        .add-site-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
                
        .add-site-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            transform: scale(1.1) rotate(90deg);
        }
                
        /* Website grid layout - Mobile first */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
        }
                
        .favorite-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center !important;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            aspect-ratio: 1;
        }
                
        .favorite-item:hover {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            transform: translateY(-3px);
        }
                
        .favorite-icon {
            width: 45px !important;
            height: 45px !important;
            margin-bottom: 8px !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
            flex-shrink: 0 !important;
            display: block !important;
        }
                
        .favorite-name {
            color: white;
            font-size: 13px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
            margin-top: 0 !important;
        }
        
        .delete-favorite-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.7);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        
        .favorite-item:hover .delete-favorite-btn {
            opacity: 1;
        }
        
        .delete-favorite-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
                
        /* Add website form */
        .add-site-form {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
                
        .add-site-form.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
                
        .add-site-form h3 {
            color: white;
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
                
        .form-input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            font-size: 15px;
            font-family: 'Microsoft YaHei', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
                
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
                
        .form-input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
                
        .form-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
                
        .form-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Microsoft YaHei', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }
                
        .btn-confirm {
            background: rgba(255, 255, 255, 0.9);
            color: black;
        }
                
        .btn-confirm:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.05);
        }
                
        .btn-cancel {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
                
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.3);
        }
                
        .overlay-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 9998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
                
        .overlay-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }
                
        /* Mobile adaptation */
        @media (max-width: 768px) {
            .favorites-container {
                padding: 15px 10px;
            }
                    
            .favorites-header {
                flex-direction: row;
                gap: 10px;
            }
                    
            .favorites-search-box {
                max-width: 100%;
                padding: 10px 15px;
                font-size: 14px;
            }
                    
            .add-site-btn {
                width: 40px;
                height: 40px;
            }
                    
            .add-site-btn svg {
                width: 20px;
                height: 20px;
            }
                    
            .favorites-grid {
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 5px !important;
                padding: 5px !important;
            }
                    
            .favorite-item {
                padding: 8px 4px !important;
            }
                    
            .favorite-icon {
                width: 32px !important;
                height: 32px !important;
                margin-bottom: 4px !important;
            }
                    
            .favorite-name {
                font-size: 11px !important;
            }
                    
            .delete-favorite-btn {
                opacity: 1 !important;
                width: 20px;
                height: 20px;
            }
                    
            .delete-favorite-btn svg {
                width: 12px;
                height: 12px;
            }
                    
            .settings-panel {
                top: auto !important;
                bottom: 20px !important;
                right: 10px !important;
                left: 10px !important;
                width: auto !important;
                max-height: 70vh !important;
                overflow-y: auto;
            }
        }
                
        /* Desktop adaptation */
        @media (min-width: 769px) {
            .favorites-container {
                max-width: 800px;
                padding: 30px 20px;
            }
                    
            .favorites-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 20px;
                padding: 15px;
            }
                    
            .favorite-item {
                padding: 12px 8px;
            }
                    
            .favorite-icon {
                width: 32px;
                height: 32px;
                margin-bottom: 6px;
            }
                    
            .favorite-name {
                font-size: 11px;
            }
                    
            .delete-favorite-btn {
                width: 18px;
                height: 18px;
            }
                    
            .delete-favorite-btn svg {
                width: 10px;
                height: 10px;
            }
        }
        
        /* 二维码扫描弹窗样式 */
        .scanner-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .scanner-modal.show {
            display: flex;
        }
        
        .scanner-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .scanner-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .scanner-header h2 {
            color: white;
            font-size: 24px;
            margin: 0;
        }
        
        .scanner-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .scanner-close svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
        
        .scanner-close:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.1);
        }
        
        .scanner-close:hover svg {
            fill: black;
        }
        
        .scanner-video-container {
            position: relative;
            width: 100%;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #000;
            border: none !important;
            outline: none !important;
        }
        
        #scannerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            -webkit-appearance: none !important;
            appearance: none !important;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }
        
        #scannerCanvas {
            display: none;
        }
        
        .scanner-result {
            color: white;
            font-size: 14px;
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            min-height: 50px;
            word-break: break-all;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .scanner-result:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .search-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }
        
        .favorites-star-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            z-index: 400;
        }
        
        .favorites-star-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
        
        .favorites-star-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.1);
        }
        
        .favorites-star-btn:hover svg {
            fill: black;
        }

        .scan-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .scan-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
        
        .scan-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.1);
        }
        
        .scan-btn:hover svg {
            fill: black;
        }

        .engine-selector-top,
        .engine-selector-bottom {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 6px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            white-space: nowrap;
            z-index: 150;
            width: calc(100% - 60px);
            max-width: 490px;
            opacity: 0;
            transform: translateX(-50%) scale(0.9) translateY(-10px);
            transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .engine-selector-top {
            bottom: 60px;
        }

        .engine-selector-bottom {
            top: 60px;
        }

        .engine-selector-top.show,
        .engine-selector-bottom.show {
            display: flex;
            opacity: 1;
            transform: translateX(-50%) scale(1) translateY(0);
        }

        .search-box {
            width: 500px;
            max-width: 90%;
            padding: 15px 20px;
            font-size: 16px;
            font-family: 'Microsoft YaHei', sans-serif;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.3s ease;
        }

        .search-box:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .search-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 14px;
            font-weight: normal;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .search-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .search-btn:hover svg {
            transform: scale(1.2);
        }

        .search-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            transform: scale(1.15);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.4);
        }

        .search-btn.active {
            font-weight: bold;
        }

        .search-suggestions {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 60px);
            max-width: 490px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 8px;
            display: none;
            z-index: 300;
        }

        .search-suggestions.show {
            display: block;
        }

        .search-suggestions::-webkit-scrollbar {
            width: 6px;
        }

        .search-suggestions::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .search-suggestions::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 3px;
        }

        .search-suggestions::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        /* 今日热点样式 */
        .hot-news {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 60px);
            max-width: 490px;
            max-height: 160px;
            overflow-y: auto;
            overflow-x: hidden;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(0px);
            border-radius: 15px;
            padding: 8px;
            display: none;
            z-index: 300;
            scroll-behavior: smooth;
        }

        .hot-news.show {
            display: block;
        }

        .hot-news::-webkit-scrollbar {
            width: 6px;
        }

        .hot-news::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .hot-news::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 3px;
        }

        .hot-news::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .hot-news-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .hot-news-item:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .hot-news-index {
            background: transparent;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            min-width: 24px;
            text-align: center;
        }

        .hot-news-title {
            flex: 1;
            font-size: 14px;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .hot-news-hot {
            font-size: 12px;
            color: #ff6b6b;

        <div class="settings-panel" id="settingsPanel">

            <div class="setting-item">
                <span class="setting-label">时钟显示</span>
                <div class="toggle-switch active" id="timeToggle">

            <div class="setting-item">
                <span class="setting-label">壁纸显示</span>
                <div class="toggle-switch active" id="wallpaperToggle">
                    <div class="toggle-knob"></div>

            <div class="setting-item">
                <span class="setting-label">搜索引擎切换</span>
                <div class="toggle-switch active" id="engineToggle">
                    <div class="toggle-knob"></div>

            <div class="setting-item">
                <span class="setting-label">搜索建议</span>
                <div class="toggle-switch active" id="suggestionToggle">
                    <div class="toggle-knob"></div>

                <span class="setting-label">今日热点</span>
                <div class="toggle-switch active" id="hotNewsToggle">
                    <div class="toggle-knob"></div>

            <div class="setting-item" id="hotNewsSourceItem">
                <span class="setting-label">热点来源</span>
                <div class="engine-select" id="hotNewsSourceBtn">
                    <span id="hotNewsSourceText">百度热搜</span>
                </div>
                <div class="engine-dropdown" id="hotNewsDropdown"></div>
            </div>
            <div class="engine-select-container" id="engineSelectContainer">
                <div class="engine-select" id="engineSelectBtn">
                    <span id="engineSelectText">必应中国</span>
                </div>
                <div class="engine-dropdown" id="engineDropdown"></div>
            </div>
            <button class="reset-btn" id="resetSettingsBtn">恢复所有设置</button>
            <button class="reset-btn" id="clearHistoryBtnPanel" style="margin-top: 10px;">清空搜索历史</button>
            <button class="reset-btn" id="clearFavoritesBtn" style="margin-top: 10px;">删除所有收藏网址</button>
        </div>
    </div>

    <script>
        // Disable right-click menu
        const contextMenu = document.getElementById('contextMenu');
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            
            // Show custom menu
            contextMenu.style.left = e.clientX + 'px';
            contextMenu.style.top = e.clientY + 'px';
            contextMenu.classList.add('show');
            
            return false;
        });

        // Close menu when clicking elsewhere
        document.addEventListener('click', function() {
            contextMenu.classList.remove('show');
        });

        // Prevent click bubbling inside menu
        contextMenu.addEventListener('click', function(e) {
            e.stopPropagation();
        });

        // Change to random wallpaper
        document.getElementById('menuRefresh').addEventListener('click', function() {
            const wallpaper = document.getElementById('wallpaper');
            wallpaper.src = 'https://bing.img.run/rand_uhd.php?t=' + new Date().getTime();
            contextMenu.classList.remove('show');
        });

        // 下载当前壁纸
        document.getElementById('menuDownload').addEventListener('click', function() {
            const wallpaper = document.getElementById('wallpaper');
            const link = document.createElement('a');
            link.href = wallpaper.src;
            link.download = 'bing_wallpaper_' + new Date().getTime() + '.jpg';
            link.target = '_blank';
            link.click();
            contextMenu.classList.remove('show');
        });
        
        // 二维码扫描功能
        const scanBtn = document.getElementById('scanBtn');
        const scannerModal = document.getElementById('scannerModal');
        const scannerClose = document.getElementById('scannerClose');
        const scannerVideo = document.getElementById('scannerVideo');
        const scannerCanvas = document.getElementById('scannerCanvas');
        const scannerCtx = scannerCanvas.getContext('2d');
        const scannerResult = document.getElementById('scannerResult');
        
        let scannerStream = null;
        let isScanning = false;
        let animationId = null;
        let hasResult = false; // Track if we have a result
        
        // Create file input for local upload
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);
        
        // Start camera
        async function startScanner() {
            try {
                scannerStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                
                scannerVideo.srcObject = scannerStream;
                scannerVideo.setAttribute('playsinline', true);
                
                await scannerVideo.play();
                
                scannerCanvas.width = scannerVideo.videoWidth;
                scannerCanvas.height = scannerVideo.videoHeight;
                
                return true;
            } catch (err) {
                console.error('Scanner start failed:', err);
                scannerResult.textContent = '无法访问摄像头：' + err.message;
                scannerResult.style.color = '#ff6b6b';
                return false;
            }
        }
        
        // Stop camera
        function stopScanner() {
            if (scannerStream) {
                scannerStream.getTracks().forEach(track => track.stop());
                scannerStream = null;
            }
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            isScanning = false;
        }
        
        // Scan QR code
        function scanQRCode() {
            if (!isScanning) return;
            
            scannerCtx.drawImage(scannerVideo, 0, 0, scannerCanvas.width, scannerCanvas.height);
            
            const imageData = scannerCtx.getImageData(0, 0, scannerCanvas.width, scannerCanvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            
            if (code) {
                // Found QR code - open in new tab immediately
                window.open(code.data, '_blank');
                // Stop scanning
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                // Close scanner modal after a short delay
                setTimeout(closeScanner, 500);
            } else {
                // No QR code found
                scannerResult.textContent = '从本地上传';
                scannerResult.style.color = 'white';
                // Continue scanning
                animationId = requestAnimationFrame(scanQRCode);
            }
        }
        
        // Handle file upload and scan
        async function handleFileUpload(file) {
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    scannerCanvas.width = img.width;
                    scannerCanvas.height = img.height;
                    scannerCtx.drawImage(img, 0, 0);
                    
                    const imageData = scannerCtx.getImageData(0, 0, scannerCanvas.width, scannerCanvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    
                    if (code) {
                        scannerResult.textContent = code.data;
                        scannerResult.style.color = '#51cf66';
                        hasResult = true;
                    } else {
                        scannerResult.textContent = '未检测到二维码';
                        scannerResult.style.color = '#ff6b6b';
                        hasResult = false;
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        // Open scanner
        async function openScanner() {
            if (isScanning) return;
            
            const started = await startScanner();
            if (!started) return;
            
            isScanning = true;
            hasResult = false; // Reset result flag
            scannerModal.classList.add('show');
            scannerResult.textContent = '从本地上传';
            scannerResult.style.color = 'white';
            
            scanQRCode();
        }
        
        // Close scanner
        function closeScanner() {
            stopScanner();
            scannerModal.classList.remove('show');
        }
        
        // Event listeners for scanner
        if (scanBtn) {
            scanBtn.addEventListener('click', openScanner);
        }
        
        // 五角星收藏按钮
        const favoritesStarBtn = document.getElementById('favoritesStarBtn');
        if (favoritesStarBtn) {
            favoritesStarBtn.addEventListener('click', function() {
                showComingSoonOverlay();
            });
        }

        if (scannerClose) {
            scannerClose.addEventListener('click', closeScanner);
        }
        
        if (scannerModal) {
            scannerModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeScanner();
                }
            });
        }
        
        // Click on result to upload file
        if (scannerResult) {
            scannerResult.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                console.log('点击上传');
                if (fileInput) {
                    fileInput.click();
                }
            });
        }
        
        // File input change event
        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                handleFileUpload(e.target.files[0]);
            }
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            stopScanner();
        });
        
        // 更新时间
        function updateTime() {
            const now = new Date();
            
            // 时分秒
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('timeMain').textContent = `${hours}:${minutes}:${seconds}`;
            
            // 年月日星期
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekDay = weekDays[now.getDay()];
            
            // 判断节日
            let festival = '';
            if (month === '01' && date === '01') festival = '元旦';
            else if (month === '02' && date === '14') festival = '情人节';
            else if (month === '03' && date === '08') festival = '妇女节';
            else if (month === '04' && date === '01') festival = '愚人节';
            else if (month === '05' && date === '01') festival = '劳动节';
            else if (month === '05' && date === '04') festival = '青年节';
            else if (month === '06' && date === '01') festival = '儿童节';
            else if (month === '07' && date === '01') festival = '建党节';
            else if (month === '08' && date === '01') festival = '建军节';
            else if (month === '09' && date === '10') festival = '教师节';
            else if (month === '10' && date === '01') festival = '国庆节';
            else if (month === '12' && date === '25') festival = '圣诞节';
            
            // 农历节日 (简单判断)
            // 春节、端午、中秋需要农历计算，这里简化处理
            
            const festivalText = festival ? ` · ${festival}` : '';
            
            document.getElementById('timeDetail').textContent = `${year}年${month}月${date}日 ${weekDay}${festivalText}`;
        }

        // 每秒更新时间
        setInterval(updateTime, 1000);
        updateTime();
        
        // 图片加载完成后渐显效果（但先不显示，等新闻加载完成）
        const wallpaper = document.getElementById('wallpaper');
        let wallpaperReady = false;
        
        // 检查图片是否已缓存
        if (wallpaper.complete) {
            // 已缓存，直接显示
            setTimeout(() => {
                wallpaper.classList.add('loaded');
                wallpaperReady = true;
            }, 100);
        } else {
            // 未缓存，等待加载完成
            wallpaper.addEventListener('load', function() {
                setTimeout(() => {
                    wallpaper.classList.add('loaded');
                    wallpaperReady = true;
                }, 100);
            });
        }

        // 加载今日热点（新闻加载完成后再显示整个页面）
        loadHotNews();

        // 搜索引擎配置
        const domesticEngines = [
            { name: '百度', url: 'https://www.baidu.com/s?wd=' },
            { name: '必应中国', url: 'https://cn.bing.com/search?q=' },
            { name: '搜狗', url: 'https://www.sogou.com/web?query=' },
            { name: '360 搜索', url: 'https://www.so.com/s?q=' },
            { name: '神马', url: 'https://m.sm.cn/s?q=' },
            { name: '夸克', url: 'https://quark.sm.cn/s?q=' },
            { name: '头条', url: 'https://so.toutiao.com/search?keyword=' },
            { name: '中国搜索', url: 'https://search.china.com.cn/#/web?kw=' },
            { name: '抖音', url: 'https://www.douyin.com/search/' }
        ];

        const internationalEngines = [
            { name: 'Bing', url: 'https://www.bing.com/search?q=' },
            { name: 'Google', url: 'https://www.google.com/search?q=' },
            { name: 'Yandex', url: 'https://yandex.com/search/?text=' },
            { name: 'Kagi', url: 'https://kagi.com/search?q=' },
            { name: 'Backdata', url: 'https://backdata.net/search?q=' },
            { name: 'Swisscows', url: 'https://swisscows.com/web?query=' },
            { name: 'Startpagina', url: 'https://www.startpagina.nl/start?ql=' },
            { name: 'Yep', url: 'https://yep.com/web?q=' },
            { name: 'Mail.ru', url: 'https://go.mail.ru/search?q=' },
            { name: 'Rambler', url: 'https://nova.rambler.ru/search?query=' },
            { name: 'Naver', url: 'https://search.naver.com/search.naver?query=' },
            { name: 'Mojeek', url: 'https://www.mojeek.com/search?q=' },
            { name: 'WolframAlpha', url: 'https://www.wolframalpha.com/input?i=' },
            { name: 'DuckDuckGo', url: 'https://duckduckgo.com/?q=' },
            { name: 'Yahoo', url: 'https://search.yahoo.com/search?p=' },
            { name: 'Startpage', url: 'https://www.startpage.com/sp/search?query=' }
        ];

        const searchEngines = [...domesticEngines, ...internationalEngines];

        // 从 localStorage 加载上次使用的搜索引擎
        const savedEngineIndex = localStorage.getItem('hellokg_current_engine');
        let currentEngineIndex = savedEngineIndex !== null ? parseInt(savedEngineIndex) : 1; // 默认必应中国
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const engineSelectorTop = document.getElementById('engineSelectorTop');
        const engineSelectorBottom = document.getElementById('engineSelectorBottom');
        const searchSuggestions = document.getElementById('searchSuggestions');
        const searchHistory = document.getElementById('searchHistory');
        const hotNewsContainer = document.getElementById('hotNews');
        let isSelectorVisible = false;
        let debounceTimer = null;
        let currentSuggestionIndex = -1; // 当前选中的搜索建议索引
        
        // 为热点容器添加一次性事件监听器（阻止滚动冒泡）
        hotNewsContainer.addEventListener('wheel', function(e) {
            e.stopPropagation();
        });
        hotNewsContainer.addEventListener('touchstart', function(e) {
            e.stopPropagation();
        }, { passive: true });
        hotNewsContainer.addEventListener('touchmove', function(e) {
            e.stopPropagation();
            // 防止触发父容器的滚动
            if (this.scrollTop + this.clientHeight >= this.scrollHeight) {
                e.preventDefault();
            }
        }, { passive: false });
        
        // 搜索历史相关
        const MAX_HISTORY = 50;
        let searchHistoryList = JSON.parse(localStorage.getItem('hellokg_search_history') || '[]');

        // 更新按钮显示
        function updateButton() {
            const hasText = searchInput.value.trim().length > 0;
            if (hasText) {
                // 显示搜索图标
                document.getElementById('switchIcon').innerHTML = '<path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>';
                document.getElementById('searchBtn').setAttribute('title', '搜索');
            } else {
                // 显示切换图标
                document.getElementById('switchIcon').innerHTML = '<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>';
                document.getElementById('searchBtn').setAttribute('title', '切换搜索引擎');
            }
            
            searchBtn.classList.toggle('active', hasText);
        }

        // 渲染搜索引擎列表
        function renderEngines() {
            engineSelectorTop.innerHTML = '';
            engineSelectorBottom.innerHTML = '';

            // 上方：国内搜索引擎
            domesticEngines.forEach((engine, index) => {
                const item = document.createElement('div');
                item.className = 'engine-item';
                if (currentEngineIndex === index) item.classList.add('active');
                item.textContent = engine.name;
                item.addEventListener('click', () => selectEngine(index));
                engineSelectorTop.appendChild(item);
            });

            // 下方：国外搜索引擎
            internationalEngines.forEach((engine, index) => {
                const globalIndex = domesticEngines.length + index;
                const item = document.createElement('div');
                item.className = 'engine-item';
                if (currentEngineIndex === globalIndex) item.classList.add('active');
                item.textContent = engine.name;
                item.addEventListener('click', () => selectEngine(globalIndex));
                engineSelectorBottom.appendChild(item);
            });
        }

        // 选择搜索引擎
        function selectEngine(index) {
            currentEngineIndex = index;
            searchInput.placeholder = `使用${searchEngines[currentEngineIndex].name}搜索...`;
            hideSelector();
            searchInput.focus();
            updateButton();
            
            // 更新下拉框显示
            const engineSelectText = document.getElementById('engineSelectText');
            if (engineSelectText) {
                engineSelectText.textContent = searchEngines[index].name;
            }
            
            // 更新下拉框中的激活状态
            const options = document.querySelectorAll('.engine-option');
            options.forEach((opt, idx) => {
                if (idx === index) {
                    opt.classList.add('active');
                } else {
                    opt.classList.remove('active');
                }
            });
            
            // 保存到 localStorage
            localStorage.setItem('hellokg_current_engine', index);
        }

        // 显示选择器
        function showSelector() {
            renderEngines();
            // 先移除 inline style，让 CSS 控制 display
            engineSelectorTop.style.display = '';
            engineSelectorBottom.style.display = '';
            engineSelectorTop.classList.add('show');
            engineSelectorBottom.classList.add('show');
            isSelectorVisible = true;
        }

        // 隐藏选择器
        function hideSelector() {
            engineSelectorTop.classList.remove('show');
            engineSelectorBottom.classList.remove('show');
            engineSelectorTop.style.display = 'none';
            engineSelectorBottom.style.display = 'none';
            isSelectorVisible = false;
        }

        // 切换选择器显示
        searchBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (searchInput.value.trim().length > 0) {
                // 执行搜索
                const query = searchInput.value.trim();
                const urlQuery = encodeURIComponent(query);
                const url = searchEngines[currentEngineIndex].url + urlQuery;
                
                // 保存搜索历史
                saveSearchHistory(query);
                
                window.open(url, '_blank');
            } else {
                // 检查开关状态
                if (window.engineSwitchEnabled === false) {
                    return;
                }
                // 切换显示引擎选择面板
                if (isSelectorVisible) {
                    hideSelector();
                } else {
                    showSelector();
                }
            }
        });

        // 点击其他地方关闭选择器
        document.addEventListener('click', function() {
            if (isSelectorVisible) {
                hideSelector();
            }
        });

        // 阻止点击选择器时关闭
        engineSelectorTop.addEventListener('click', function(e) {
            e.stopPropagation();
        });
        engineSelectorBottom.addEventListener('click', function(e) {
            e.stopPropagation();
        });

        // 设置按钮功能
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        let isSettingsOpen = false;

        settingsBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            
            if (isSettingsOpen) {
                settingsPanel.classList.remove('show');
            } else {
                settingsPanel.classList.add('show');
            }
            isSettingsOpen = !isSettingsOpen;
        });

        // 点击其他地方关闭设置面板
        document.addEventListener('click', function() {
            if (isSettingsOpen) {
                settingsPanel.classList.remove('show');
                isSettingsOpen = false;
            }
        });

        // 阻止点击设置面板时关闭
        settingsPanel.addEventListener('click', function(e) {
            e.stopPropagation();
        });

        // 开关切换功能
        function toggleSetting(toggleId, callback, settingKey) {
            const toggle = document.getElementById(toggleId);
            
            // 从 localStorage 加载保存的状态
            const savedState = localStorage.getItem(settingKey);
            if (savedState !== null) {
                const isEnabled = savedState === 'true';
                if (isEnabled) {
                    toggle.classList.add('active');
                } else {
                    toggle.classList.remove('active');
                }
                callback(isEnabled);
            }
            
            toggle.addEventListener('click', function() {
                this.classList.toggle('active');
                const isEnabled = this.classList.contains('active');
                callback(isEnabled);
                // 保存到 localStorage
                localStorage.setItem(settingKey, isEnabled);
            });
        }

        // 古诗词显示开关
        toggleSetting('poetryToggle', function(enabled) {
            const poetryContainer = document.getElementById('poetryContainer');
            poetryContainer.style.display = enabled ? 'block' : 'none';
        }, 'hellokg_poetry_enabled');

        // 时钟显示开关
        toggleSetting('timeToggle', function(enabled) {
            const timeContainer = document.getElementById('timeContainer');
            timeContainer.style.display = enabled ? 'block' : 'none';
        }, 'hellokg_time_enabled');

        // 壁纸显示开关

                    e.preventDefault();

                    updateSuggestionHighlight();
                    break;
                    
                case 'ArrowUp':
                    e.preventDefault();
                    currentSuggestionIndex = currentSuggestionIndex < 0 ? itemCount - 1 : currentSuggestionIndex - 1;
                    updateSuggestionHighlight();
                    break;
                    
                case 'Enter':
                    e.preventDefault();
                    if (currentSuggestionIndex >= 0 && currentSuggestionIndex < itemCount) {
                        selectSuggestion(items[currentSuggestionIndex].textContent);
                    } else if (searchInput.value.trim().length > 0) {
                        searchBtn.click();

            if (!query || query.trim().length === 0) return;
            
            // 移除已存在的记录
            searchHistoryList = searchHistoryList.filter(item => item !== query);
            
            // 添加到开头
            searchHistoryList.unshift(query);
            
            // 限制最多 50 条
            if (searchHistoryList.length > MAX_HISTORY) {
                searchHistoryList = searchHistoryList.slice(0, MAX_HISTORY);

            // 保存到 localStorage
            localStorage.setItem('hellokg_search_history', JSON.stringify(searchHistoryList));

                name: 'KgWinNas',
                url: 'https://wwbpg.lanzouu.com/iQysW3ibdxpe',
                icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#45B7D1"/><text x="50" y="70" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">N</text></svg>`,
                fixed: true
            }
        ];
        
        // 合并固定收藏和用户收藏
        function getAllFavorites() {
            return [...fixedFavorites, ...favoritesList];
        }
        
        // 显示遮罩层（收藏夹界面）
        function showComingSoonOverlay() {
            if (isOverlayShowing) return;
            
            const overlay = document.getElementById('comingSoonOverlay');
            overlay.classList.add('show');
            document.getElementById('overlayBackdrop').classList.add('show');
            isOverlayShowing = true;
            
            // 隐藏搜索相关元素
            hideSearchUI();
            
            // 渲染收藏夹
            renderFavorites();
        }
        
        // 隐藏遮罩层
        function hideComingSoonOverlay() {
            const overlay = document.getElementById('comingSoonOverlay');
            overlay.classList.remove('show');
            document.getElementById('overlayBackdrop').classList.remove('show');
            isOverlayShowing = false;
            
            // restoreSearchUI 会自动恢复时间、古诗、设置按钮
            restoreSearchUI();
        }
        
        // 渲染收藏夹列表
        function renderFavorites(filterText = '') {
            const grid = document.getElementById('favoritesGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            // 获取所有收藏（固定 + 用户）
            const allFavorites = getAllFavorites();
            
            // 过滤搜索
            const filteredFavorites = filterText ? 
                allFavorites.filter(fav => fav.name.toLowerCase().includes(filterText.toLowerCase())) :
                allFavorites;
            
            filteredFavorites.forEach((fav, index) => {
                const item = document.createElement('div');
                item.className = 'favorite-item';
                
                // 判断是否是固定收藏
                const isFixed = fav.fixed === true;
                
                // 生成图标 HTML
                let iconHtml = '';
                if (isFixed && fav.icon) {
                    // 固定收藏使用内嵌 SVG
                    iconHtml = `<div class="favorite-icon" style="background-image: url('data:image/svg+xml;utf8,${encodeURIComponent(fav.icon)}');"></div>`;
                } else {
                    // 用户收藏使用原有逻辑
                    const firstLetter = fav.name.charAt(0).toUpperCase();
                    const svgIcon = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='#4a4a4a'/><text x='50' y='60' font-size='50' text-anchor='middle' fill='white' font-family='Microsoft YaHei, Arial'>${firstLetter}</text></svg>`;
                    const backupIcon = 'data:image/svg+xml;utf8,' + encodeURIComponent(svgIcon);
                    iconHtml = `<div class="favorite-icon" style="background-image: url('${fav.icon || backupIcon}');"></div>`;
                }
                
                // 删除按钮只对非固定收藏显示
                const deleteBtnHtml = isFixed ? '' : `
                    <button class="delete-favorite-btn" data-index="${index}" title="删除">
                        <svg viewBox="0 0 24 24">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                    </button>
                `;
                
                item.innerHTML = `
                    ${deleteBtnHtml}
                    ${iconHtml}
                    <div class="favorite-name">${fav.name}</div>
                `;
                
                // 点击网站跳转
                item.addEventListener('click', (e) => {
                    if (!e.target.closest('.delete-favorite-btn')) {
                        window.open(fav.url, '_blank');
                    }
                });
                
                // 删除按钮
                const deleteBtn = item.querySelector('.delete-favorite-btn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        // 计算在 favoritesList 中的实际索引
                        const actualIndex = index - fixedFavorites.length;
                        deleteFavorite(actualIndex);
                    });
                }
                
                grid.appendChild(item);
            });
        }
        
        // 添加收藏网站
        function addFavorite(name, url) {
            // 自动补全协议
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            try {
                const urlObj = new URL(url);
                // 使用官网链接 + /favicon.ico 获取图标
                const iconUrl = `${urlObj.protocol}//${urlObj.hostname}/favicon.ico`;
                
                favoritesList.push({ name, url, icon: iconUrl });
                localStorage.setItem('hellokg_favorites', JSON.stringify(favoritesList));
                renderFavorites();
            } catch (e) {
                alert('网址格式不正确，请检查后重试');
            }
        }
        
        // 测试图片是否可加载
        function testImage(src, fallback) {
            const img = new Image();
            img.onload = () => { /* 成功加载 */ };
            img.onerror = () => { /* 加载失败，使用备用图标 */ };
            img.src = src;
            return src;
        }
        
        // 删除收藏网站
        function deleteFavorite(index) {
            showCustomConfirm(`确定要删除 "${favoritesList[index].name}" 吗？`, function() {
                favoritesList.splice(index, 1);
                localStorage.setItem('hellokg_favorites', JSON.stringify(favoritesList));
                renderFavorites();
            });
        }
        
        // 搜索收藏网站
        const favoritesSearchBox = document.getElementById('favoritesSearchBox');
        if (favoritesSearchBox) {
            favoritesSearchBox.addEventListener('input', function() {
                renderFavorites(this.value.trim());
            });
        }
        
        // 添加网站按钮
        const addSiteBtn = document.getElementById('addSiteBtn');
        if (addSiteBtn) {
            addSiteBtn.addEventListener('click', function() {
                document.getElementById('addSiteForm').classList.add('show');
                document.getElementById('siteNameInput').focus();
            });
        }
        
        // 确认添加
        const confirmAddBtn = document.getElementById('confirmAddBtn');
        if (confirmAddBtn) {
            confirmAddBtn.addEventListener('click', function() {
                const name = document.getElementById('siteNameInput').value.trim();
                let url = document.getElementById('siteUrlInput').value.trim();
                
                if (!name || !url) {
                    alert('请填写网站名称和地址');
                    return;
                }
                
                addFavorite(name, url);
                closeAddForm();
            });
        }
        
        // 取消添加
        const cancelAddBtn = document.getElementById('cancelAddBtn');
        if (cancelAddBtn) {
            cancelAddBtn.addEventListener('click', function() {
                closeAddForm();
            });
        }
        
        // 关闭表单
        function closeAddForm() {
            document.getElementById('addSiteForm').classList.remove('show');
            document.getElementById('siteNameInput').value = '';
            document.getElementById('siteUrlInput').value = '';
        }
        
        // 点击背景关闭表单
        const backdrop = document.getElementById('overlayBackdrop');
        if (backdrop) {
            backdrop.addEventListener('click', function() {
                closeAddForm();
            });
        }
        
        // 隐藏搜索界面（用于收藏界面等非 searching 场景）
        function hideSearchUI() {
            const poetryContainer = document.getElementById('poetryContainer');
            const timeContainer = document.getElementById('timeContainer');
            const settingsBtn = document.getElementById('settingsBtn');
            
            if (poetryContainer) {
                poetryContainer.style.opacity = '0';
                poetryContainer.style.marginTop = '-50px';
            }
            if (timeContainer) {
                timeContainer.style.opacity = '0';
                timeContainer.style.marginTop = '-50px';
            }
            if (settingsBtn) {
                settingsBtn.style.opacity = '0';
                settingsBtn.style.marginTop = '-50px';
            }
        }
        
        // 恢复搜索界面（用于收藏界面退出等非 searching 场景）
        function restoreSearchUI() {
            const poetryContainer = document.getElementById('poetryContainer');
            const timeContainer = document.getElementById('timeContainer');
            const settingsBtn = document.getElementById('settingsBtn');
            
            if (poetryContainer) {
                poetryContainer.style.opacity = '1';
                poetryContainer.style.marginTop = '0';
            }
            if (timeContainer) {
                timeContainer.style.opacity = '1';
                timeContainer.style.marginTop = '0';
            }
            if (settingsBtn) {
                settingsBtn.style.opacity = '1';
                settingsBtn.style.marginTop = '0';
            }
        }
        
        // 监听鼠标滚轮事件（带节流）
        document.addEventListener('wheel', function(e) {
            const now = Date.now();
            
            // 检查设置面板是否显示
            const settingsPanel = document.getElementById('settingsPanel');
            const isSettingsShowing = settingsPanel && settingsPanel.classList.contains('show');
            
            console.log('滚轮事件 - 设置面板显示:', isSettingsShowing, '遮罩层显示:', isOverlayShowing);
            
            // 如果设置面板已显示，不触发收藏界面
            if (isSettingsShowing) {
                console.log('设置面板显示中，阻止收藏界面触发');
                return;
            }
            
            // 如果遮罩层已显示，向上滚动可以关闭（带延迟防止误触）
            if (isOverlayShowing) {
                if (e.deltaY < -WHEEL_THRESHOLD && now - lastWheelTime > 300) {
                    hideComingSoonOverlay();
                    lastWheelTime = now;
                }
                return;
            }
            
            // 节流：两次触发至少间隔 500ms
            if (now - lastWheelTime < 500) {
                return;
            }
            
            // 累积滚轮值
            wheelAccumulator += e.deltaY;
            
            // 检测向下的滚轮动作
            if (wheelAccumulator > WHEEL_THRESHOLD) {
                showComingSoonOverlay();
                wheelAccumulator = 0;
                lastWheelTime = now;
            }
            
            // 重置累积值（防止误触）
            clearTimeout(wheelDebounceTimer);
            wheelDebounceTimer = setTimeout(() => {
                wheelAccumulator = 0;
            }, 200);
        });
        
        // 监听触摸开始
        document.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
            clearTimeout(touchDebounceTimer);
        }, { passive: true });
        
        // 监听触摸结束（带节流）
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            
            // 检查设置面板是否显示
            const settingsPanel = document.getElementById('settingsPanel');
            const isSettingsShowing = settingsPanel && settingsPanel.classList.contains('show');
            
            console.log('触摸事件 - 设置面板显示:', isSettingsShowing, '遮罩层显示:', isOverlayShowing);
            
            // 如果设置面板已显示，不触发收藏界面
            if (isSettingsShowing) {
                console.log('设置面板显示中，阻止收藏界面触发');
                return;
            }
            
            // 如果遮罩层已显示，向上滑动可以关闭（带延迟防止误触）
            if (isOverlayShowing) {
                touchEndY = e.changedTouches[0].clientY;
                const swipeDistance = touchStartY - touchEndY; // 向上滑是负数
                if (swipeDistance < -SWIPE_THRESHOLD && now - lastWheelTime > 300) {
                    hideComingSoonOverlay();
                    lastWheelTime = now;
                }
                return;
            }
            
            // 节流：两次触发至少间隔 500ms
            if (now - lastWheelTime < 500) {
                return;
            }
            
            touchEndY = e.changedTouches[0].clientY;
            const swipeDistance = touchStartY - touchEndY; // 向下滑是正数
            
            console.log('触摸结束:', 'start:', touchStartY, 'end:', touchEndY, '距离:', swipeDistance);
            
            // 检测向下的滑动手势（正数表示向下滑）
            if (swipeDistance > SWIPE_THRESHOLD) {
                showComingSoonOverlay();
                lastWheelTime = now;
            }
        }, { passive: true });
        
        // 点击遮罩层也可以关闭
        document.getElementById('comingSoonOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                hideComingSoonOverlay();
            }
        });
    </script>
</body>
</html>
